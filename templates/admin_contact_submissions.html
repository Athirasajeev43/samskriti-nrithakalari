{% extends 'base.html' %}

{% block content %}
<div style="max-width:1200px;margin:40px auto;padding:20px;">
    <h2 style="text-align:center;color:#8B0000;margin-bottom:20px;">Contact Messages</h2>

    <div style="overflow:auto;border-radius:16px;border:1px solid #eee;background:white;">
        <table style="width:100%;border-collapse:collapse;">
            <thead>
                <tr style="background:#fafafa;">
                    <th style="text-align:left;padding:12px 14px;border-bottom:1px solid #eee;">Name</th>
                    <th style="text-align:left;padding:12px 14px;border-bottom:1px solid #eee;">Email</th>
                    <th style="text-align:left;padding:12px 14px;border-bottom:1px solid #eee;">Phone</th>
                    <th style="text-align:left;padding:12px 14px;border-bottom:1px solid #eee;">Message</th>
                    <th style="text-align:left;padding:12px 14px;border-bottom:1px solid #eee;">Time</th>
                </tr>
            </thead>
            <tbody>
                {% for item in items %}
                    <tr>
                        <td style="padding:12px 14px;border-bottom:1px solid #f2f2f2;">{{ item.name }}</td>
                        <td style="padding:12px 14px;border-bottom:1px solid #f2f2f2;">{{ item.email }}</td>
                        <td style="padding:12px 14px;border-bottom:1px solid #f2f2f2;">{{ item.phone }}</td>
                        <td style="padding:12px 14px;border-bottom:1px solid #f2f2f2;max-width:520px;word-break:break-word;">
                            {{ item.message }}
                        </td>
                        <td style="padding:12px 14px;border-bottom:1px solid #f2f2f2;font-size:12px;color:#666;">
                            {{ item.created_at }}
                        </td>
                    </tr>
                {% empty %}
                    <tr>
                        <td colspan="5" style="padding:18px;color:#555;text-align:center;">No contact messages yet.</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
