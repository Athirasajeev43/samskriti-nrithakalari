<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | Samskriti Nrithakalari</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Floating decorative elements */
        body::before {
            content: '🎭';
            position: absolute;
            top: 10%;
            left: 5%;
            font-size: 60px;
            opacity: 0.1;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }

        body::after {
            content: '💃';
            position: absolute;
            bottom: 10%;
            right: 5%;
            font-size: 70px;
            opacity: 0.1;
            animation: float 10s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            50% {
                transform: translate(20px, -20px) rotate(10deg);
            }
        }

        .registration-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: rgba(255,255,255,0.5);
            border-radius: 3px;
        }

        .header h2 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .form-section {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            color: #999;
            font-size: 18px;
            transition: all 0.3s ease;
            z-index: 1;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="password"] {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
            background: white;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        input[type="text"]:hover,
        input[type="email"]:hover,
        input[type="number"]:hover,
        input[type="password"]:hover {
            border-color: #999;
        }

        input:focus + .input-icon {
            color: #667eea;
            transform: scale(1.1);
        }

        .button-wrapper {
            margin-top: 35px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .login-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .login-link a:hover {
            color: #764ba2;
        }

        .login-link a:hover::after {
            width: 100%;
        }

        .form-footer {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
        }

        .form-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .form-footer a:hover {
            color: #764ba2;
        }

        /* Style for number input arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            opacity: 1;
            height: 24px;
        }

        /* Error state */
        input.error {
            border-color: #ff4444;
        }

        .error-message {
            color: #ff4444;
            font-size: 11px;
            margin-top: 5px;
            padding-left: 15px;
        }

        /* Success animation for button */
        .success-animation {
            animation: successPulse 0.5s ease;
        }

        @keyframes successPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); background: linear-gradient(135deg, #48bb78, #38a169); }
            100% { transform: scale(1); }
        }

        /* Responsive design */
        @media (max-width: 480px) {
            .form-section {
                padding: 30px 20px;
            }
            
            .header h2 {
                font-size: 24px;
            }

            .header p {
                font-size: 12px;
            }

            .header {
                padding: 25px 20px;
            }

            button {
                font-size: 16px;
                padding: 14px;
            }

            .input-icon {
                font-size: 16px;
                left: 12px;
            }

            input[type="text"],
            input[type="email"],
            input[type="number"],
            input[type="password"] {
                padding: 12px 12px 12px 42px;
                font-size: 14px;
            }

            body::before,
            body::after {
                display: none;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
        }

        /* Selection color */
        ::selection {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }

        /* INPUT WRAPPER */
.input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
}

/* ICON */
.input-icon {
    position: absolute;
    left: 15px;
    font-size: 18px;
    color: #8B1E3F;
    z-index: 2;
}

/* DATE INPUT */
input[type="date"] {
    width: 100%;
    padding: 14px 15px 14px 45px;
    border-radius: 25px;
    border: 2px solid rgba(139, 30, 63, 0.2);
    background: linear-gradient(135deg, #FFF8E7, #FDF1E6);
    font-size: 16px;
    font-family: 'Poppins', sans-serif;
    color: #4A4A4A;
    outline: none;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* HOVER EFFECT */
input[type="date"]:hover {
    border-color: #D4AF37;
}

/* FOCUS EFFECT */
input[type="date"]:focus {
    border-color: #8B1E3F;
    box-shadow: 0 0 0 3px rgba(139, 30, 63, 0.15);
    background: white;
}

/* CALENDAR ICON (RIGHT SIDE) */
input[type="date"]::-webkit-calendar-picker-indicator {
    background: none;
    position: absolute;
    right: 15px;
    cursor: pointer;
    opacity: 0.7;
    filter: invert(22%) sepia(30%) saturate(1200%) hue-rotate(320deg);
}

/* REMOVE DEFAULT ICON ON SOME BROWSERS */
input[type="date"]::-webkit-inner-spin-button,
input[type="date"]::-webkit-clear-button {
    display: none;
}
    </style>
</head>
<body>
    <div class="registration-container">
        <div class="header">
            <h2>Student Registration</h2>
            <p>Join our learning community today!</p>
        </div>
        
        <div class="form-section">
            <form method="POST" id="registrationForm">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" name="username" id="username" placeholder="Choose a username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" name="email" id="email" placeholder="Enter your email" required>
                    </div>
                </div>

<div class="form-group">
    <label for="dob">Date of Birth</label>
    <div class="input-wrapper">
        <span class="input-icon">🎂</span>
        <input type="date" name="dob" id="dob" required>
    </div>
</div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📱</span>
                        <input type="text" name="phone" id="phone" placeholder="Enter your phone number" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" name="password" id="password" placeholder="Create a password" required>
                    </div>
                </div>

                <div class="button-wrapper">
                    <button type="submit">Create Account</button>
                </div>

                <div class="login-link">
                    Already have an account? <a href="{% url 'login' %}">Sign In</a>
                </div>

                <div class="form-footer">
                    By registering, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Interactive functionality
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('registrationForm');
            const submitBtn = form.querySelector('button');
            
            // Input field animations and validation
            const inputs = document.querySelectorAll('input');
            
            inputs.forEach(input => {
                // Focus animation
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'scale(1.01)';
                    this.parentElement.style.transition = 'transform 0.2s ease';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'scale(1)';
                });
                
                // Email validation
                if (input.type === 'email') {
                    input.addEventListener('input', function() {
                        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                        if (this.value && !emailPattern.test(this.value)) {
                            this.classList.add('error');
                            let errorMsg = this.parentElement.nextElementSibling;
                            if (!errorMsg || !errorMsg.classList.contains('error-message')) {
                                errorMsg = document.createElement('div');
                                errorMsg.className = 'error-message';
                                errorMsg.textContent = 'Please enter a valid email address';
                                this.parentElement.parentElement.insertAdjacentElement('beforeend', errorMsg);
                            }
                        } else {
                            this.classList.remove('error');
                            const errorMsg = this.parentElement.parentElement.querySelector('.error-message');
                            if (errorMsg) errorMsg.remove();
                        }
                    });
                }
                
                // Phone validation (10 digits)
                if (input.name === 'phone') {
                    input.addEventListener('input', function() {
                        const phonePattern = /^[0-9]{10}$/;
                        if (this.value && this.value.length > 0 && !phonePattern.test(this.value)) {
                            this.classList.add('error');
                            let errorMsg = this.parentElement.nextElementSibling;
                            if (!errorMsg || !errorMsg.classList.contains('error-message')) {
                                errorMsg = document.createElement('div');
                                errorMsg.className = 'error-message';
                                errorMsg.textContent = 'Please enter a valid 10-digit phone number';
                                this.parentElement.parentElement.insertAdjacentElement('beforeend', errorMsg);
                            }
                        } else {
                            this.classList.remove('error');
                            const errorMsg = this.parentElement.parentElement.querySelector('.error-message');
                            if (errorMsg) errorMsg.remove();
                        }
                    });
                }
                
                // Age validation
                if (input.name === 'age') {
                    input.addEventListener('input', function() {
                        const age = parseInt(this.value);
                        if (this.value && (age < 1 || age > 120)) {
                            this.classList.add('error');
                            let errorMsg = this.parentElement.nextElementSibling;
                            if (!errorMsg || !errorMsg.classList.contains('error-message')) {
                                errorMsg = document.createElement('div');
                                errorMsg.className = 'error-message';
                                errorMsg.textContent = 'Please enter a valid age (1-120)';
                                this.parentElement.parentElement.insertAdjacentElement('beforeend', errorMsg);
                            }
                        } else {
                            this.classList.remove('error');
                            const errorMsg = this.parentElement.parentElement.querySelector('.error-message');
                            if (errorMsg) errorMsg.remove();
                        }
                    });
                }
            });
            
            // Form submission animation
            form.addEventListener('submit', function(e) {
                submitBtn.classList.add('success-animation');
                setTimeout(() => {
                    submitBtn.classList.remove('success-animation');
                }, 500);
            });
            
            // Button hover effect
            submitBtn.addEventListener('click', function(e) {
                this.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });


        
    </script>
</body>
</html>
