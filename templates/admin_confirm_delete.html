{% extends 'base.html' %}

{% block content %}
<div style="max-width:700px;margin:40px auto;padding:20px;">
    <h2 style="text-align:center;color:#8B0000;margin-bottom:15px;">Confirm Delete</h2>
    <div style="background:#fff;border:1px solid #eee;border-radius:18px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,0.05);">
        <p style="color:#555;margin-bottom:18px;">
            Are you sure you want to delete this {{ type_name }}?
        </p>
        <p style="font-weight:700;margin-bottom:18px;">{{ obj }}</p>

        <form method="POST">
            {% csrf_token %}
            <div style="display:flex;gap:12px;">
                <button type="submit" style="flex:1;padding:12px;border:none;border-radius:14px;background:#b00020;color:white;font-weight:800;cursor:pointer;">
                    Delete
                </button>
                <a href="javascript:history.back()" style="flex:1;display:flex;align-items:center;justify-content:center;padding:12px;border-radius:14px;border:1px solid #eee;background:#fafafa;color:#555;text-decoration:none;font-weight:800;">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
