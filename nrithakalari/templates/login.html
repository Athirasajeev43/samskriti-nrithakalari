<!DOCTYPE html>
<html>
<head>
    <title>Login | Student Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        .bg-shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .shape1 {
            width: 300px;
            height: 300px;
            top: -150px;
            right: -150px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            animation: float 6s ease-in-out infinite;
        }

        .shape2 {
            width: 400px;
            height: 400px;
            bottom: -200px;
            left: -200px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
            animation: float 8s ease-in-out infinite reverse;
        }

        .shape3 {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 440px;
            padding: 50px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .logo-circle span {
            font-size: 40px;
            color: white;
        }

        h2 {
            color: #333;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .welcome-text {
            text-align: center;
            color: #666;
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .welcome-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .welcome-text a:hover {
            color: #764ba2;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #999;
            font-size: 18px;
            transition: color 0.3s ease;
            z-index: 1;
        }

        input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid #eef2f6;
            border-radius: 16px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: white;
            color: #333;
            font-weight: 500;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: white;
        }

        input:focus + .input-icon {
            color: #667eea;
        }

        input:hover {
            border-color: #cbd5e0;
        }

        input::placeholder {
            color: #a0aec0;
            font-weight: 400;
            font-size: 14px;
        }

        .forgot-password {
            text-align: right;
            margin-top: 8px;
        }

        .forgot-password a {
            color: #718096;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password a:hover {
            color: #667eea;
        }

        .button-wrapper {
            margin-top: 35px;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.5);
            position: relative;
            overflow: hidden;
        }

        button:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -5px rgba(102, 126, 234, 0.7);
        }

        button:hover:before {
            left: 100%;
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.5);
        }

        .signup-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #eef2f6;
            color: #718096;
            font-size: 15px;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
            transition: all 0.3s ease;
            position: relative;
        }

        .signup-link a:after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .signup-link a:hover:after {
            width: 100%;
        }

        /* Error message styling (for any potential messages) */
        .error-message {
            background: #fff5f5;
            color: #e53e3e;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #e53e3e;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .error-message:before {
            content: '⚠️';
            font-size: 16px;
        }

        /* Success message styling */
        .success-message {
            background: #f0fff4;
            color: #38a169;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #38a169;
            font-size: 14px;
        }

        /* Responsive design */
        @media (max-width: 480px) {
            .login-container {
                padding: 35px 25px;
            }

            h2 {
                font-size: 28px;
            }

            input {
                padding: 14px 16px 14px 45px;
                font-size: 14px;
            }

            button {
                padding: 16px;
                font-size: 16px;
            }

            .logo-circle {
                width: 60px;
                height: 60px;
            }

            .logo-circle span {
                font-size: 30px;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
            }
        }

        /* Loading state (optional enhancement) */
        .loading button {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Remember me checkbox (if you want to add it later) */
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-top: 15px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
            accent-color: #667eea;
        }

        .checkbox-group label {
            margin-bottom: 0;
            font-weight: 500;
            color: #4a5568;
        }
    </style>
</head>
<body>
    <!-- Animated background shapes -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="login-container">
        <!-- Logo section -->
        <div class="logo">
            <div class="logo-circle">
                <span>🔐</span>
            </div>
            <h2>Welcome Back</h2>
            <div class="welcome-text">
                Please login to your account
            </div>
        </div>

        <!-- Login form - All original functionality preserved -->
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" name="username" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <div class="forgot-password">
                    <a href="#">Forgot password?</a>
                </div>
            </div>

            <div class="button-wrapper">
                <button type="submit">Login</button>
            </div>

            <div class="signup-link">
                Don't have an account? 
                <a href="{% url 'register' %}">Create Account</a>
            </div>

            <div style="text-align:center;margin-top:12px;color:#666;font-size:14px;">
                Are you an admin?
                <a href="{% url 'admin_login' %}" style="color:#667eea;font-weight:700;text-decoration:none;margin-left:6px;">
                    Admin Login
                </a>
            </div>
        </form>

        <!-- Note: The form action is still POST, 
             CSRF token is preserved, 
             field names (username, password) unchanged -->
    </div>
</body>
</html>
